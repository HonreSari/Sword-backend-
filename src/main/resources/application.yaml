spring:
  application:
    name: Jain-Lai-backend
  datasource:
    url: jdbc:mysql://localhost:3306/sword_of_coming?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: admin
  jpa:
    hibernate:
      ddl-auto: update # use 'validate' in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
      redis:
        host: localhost
        port: 6379
        # password: your_password (if any)
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 minutes TTL

server:
  port: 8080
